const proportions = [1, 1.5, 0.75, 1.33, 0.8];

// 2. FUNZIONE PER APRIRE IL MODALE UNIVERSALE
const aprireModal = (contenutoHtml) => {
    const modal = document.createElement('div');
    modal.className = "fixed inset-0 z-[100] bg-black/95 backdrop-blur-xl flex items-center justify-center p-4 md:p-10";
    modal.style.animation = "fadeIn 0.4s ease-out";
    
    modal.innerHTML = `
        <div class="bg-[#0a0a0a] text-white w-full max-w-6xl max-h-[90vh] overflow-y-auto rounded-[2.5rem] border border-white/5 shadow-2xl relative mt-[150px]">
            <button id="closeModal" class="sticky top-6 float-right mr-6 z-50 bg-white/10 hover:bg-white text-white hover:text-black p-3 rounded-full transition-all">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
            
            <div class="p-10 md:p-20">
                ${contenutoHtml}
            </div>
        </div>
    `;

    document.body.appendChild(modal);
    document.body.style.overflow = 'hidden';

    const chiudi = () => {
        modal.remove();
        document.body.style.overflow = 'auto';
    };

    modal.querySelector('#closeModal').onclick = chiudi;
    modal.onclick = (e) => { if(e.target === modal) chiudi(); };
};

// 3. FUNZIONE SETUP GRIGLIA
const setup = () => {
    columnsContainer.innerHTML = '';
    myProjects.sort(() => Math.random() - 0.5);
    
    const count = Math.ceil(window.innerWidth / 360);

    for (let i = 0; i < count; i++) {
        const col = document.createElement('div');
        col.className = "flex flex-col gap-4";
        columnsContainer.appendChild(col);
    }

    myProjects.forEach((project, i) => {
        const card = document.createElement('div');
        card.className = "group relative block w-full overflow-hidden rounded-2xl transition-all duration-500 hover:scale-105 z-10 bg-[#0c0c0c] shadow-xl cursor-pointer";

        // Se è una card speciale (Chi sono / Contatti)
        if (project.type === 'special') {
            card.style.aspectRatio = "1 / 1";
            card.style.backgroundColor = project.bgColor;
            card.className += " flex flex-col justify-center items-center p-8 text-white text-center";
            card.innerHTML = `<h2 class="font-bold text-2xl uppercase" style="font-family:'gothambold'">${project.title}</h2>`;
            card.onclick = () => aprireModal(project.html);
        } 
        // Se è un progetto normale (Media)
        else {
            if (!project.original) {
                card.style.aspectRatio = proportions[i % proportions.length];
            }

            let media;
            const isVideo = project.url.toLowerCase().endsWith('.mp4');
            if (isVideo) {
                media = document.createElement('video');
                media.src = project.url;
                media.autoplay = media.loop = media.muted = true;
                media.setAttribute('playsinline', ''); 
            } else {
                media = document.createElement('img');
                media.src = project.url;
            }

            media.className = project.original ? "w-full h-auto block" : "w-full h-full object-cover block";
            media.classList.add("transition-transform", "duration-700", "group-hover:scale-110");

            const overlay = document.createElement('div');
            overlay.className = "absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center p-6 text-center";
            overlay.innerHTML = `<h3 class="text-white font-bold text-lg uppercase tracking-widest translate-y-4 group-hover:translate-y-0 transition-transform duration-500" style="font-family:'gothambold'">${project.title}</h3>`;

            card.appendChild(media);
            card.appendChild(overlay);
            
            // Ogni card apre il modale
            card.onclick = () => aprireModal(project.html);
        }

        const targetColumn = columnsContainer.children[i % count];
        targetColumn.appendChild(card);
    });

    columnsContainer.className = `grid grid-cols-${count} gap-4 px-4 md:px-10`;
    loading.style.display = 'none';
};

// 4. ESECUZIONE
setup();

let timer;
window.addEventListener('resize', () => {
    loading.style.display = 'block';
    clearTimeout(timer);
    timer = setTimeout(setup, 300);
});
