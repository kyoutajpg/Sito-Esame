        // FUNZIONE MODALE
        const aprireModal = (html) => {
            const modal = document.createElement('div');
            modal.className = "fixed inset-0 z-[100] bg-black/95 backdrop-blur-xl flex items-center justify-center p-4 md:p-10";
            modal.style.animation = "fadeIn 0.4s ease-out";
            
            modal.innerHTML = `
                <div class="bg-[#0a0a0a] text-white w-full max-w-6xl max-h-[80vh] overflow-y-auto rounded-[2.5rem] border border-white/5 shadow-2xl relative mt-[100px]">
                    <button id="closeModal" class="sticky top-6 float-right mr-6 z-50 bg-white/10 hover:bg-white text-white hover:text-black p-3 rounded-full transition-all">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </button>
                    <div class="p-8 md:p-16">
                        ${html}
                    </div>
                </div>
            `;

            document.body.appendChild(modal);
            document.body.style.overflow = 'hidden';

            const chiudi = () => {
                modal.remove();
                document.body.style.overflow = 'auto';
            };

            modal.querySelector('#closeModal').onclick = chiudi;
            modal.onclick = (e) => { if(e.target === modal) chiudi(); };
        };

        // SETUP GRIGLIA
        const setup = () => {
            columnsContainer.innerHTML = '';
            myProjects.sort(() => Math.random() - 0.5);
            
            const count = Math.ceil(window.innerWidth / 360);

            for (let i = 0; i < count; i++) {
                const col = document.createElement('div');
                col.className = "flex flex-col gap-4";
                columnsContainer.appendChild(col);
            }

            myProjects.forEach((project, i) => {
                const card = document.createElement('div');
                card.className = "group relative block w-full overflow-hidden rounded-2xl transition-all duration-500 hover:scale-105 bg-[#0c0c0c] shadow-xl cursor-pointer";

                if (!project.original) {
                    card.style.aspectRatio = proportions[i % proportions.length];
                }

                let media;
                const isVideo = project.url.toLowerCase().endsWith('.mp4');
                
                if (isVideo) {
                    media = document.createElement('video');
                    media.src = project.url;
                    media.autoplay = media.loop = media.muted = true;
                    media.setAttribute('playsinline', ''); 
                } else {
                    media = document.createElement('img');
                    media.src = project.url;
                    media.alt = project.title;
                }

                media.className = project.original ? "w-full h-auto block" : "w-full h-full object-cover block";
                media.classList.add("transition-transform", "duration-700", "group-hover:scale-110");

                const overlay = document.createElement('div');
                overlay.className = "absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center p-6 text-center";
                overlay.innerHTML = `<h3 class="text-white font-bold text-lg uppercase tracking-widest translate-y-4 group-hover:translate-y-0 transition-transform duration-500" style="font-family:'kitora'">${project.title}</h3>`;

                card.appendChild(media);
                card.appendChild(overlay);
                card.onclick = () => aprireModal(project.html);

                const targetColumn = columnsContainer.children[i % count];
                targetColumn.appendChild(card);
            });

            columnsContainer.className = `grid grid-cols-${count} gap-4 px-4 md:px-10`;
            loading.style.display = 'none';
        };

        setup();

        /*let timer;

        // MENU MOBILE
        const navbar = document.getElementById('navbar');
        const logoTrigger = document.getElementById('logo-trigger');
        const menuItems = document.querySelectorAll('.menu-item');
        let isMenuOpen = false;

        logoTrigger.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                const tl = gsap.timeline();

                if (!isMenuOpen) {
                    gsap.set(menuItems, { display: 'block' });
                    
                    tl.to(navbar, {
                        height: "auto", 
                        duration: 0.5,
                        ease: "power2.out"
                    })
                    .to(menuItems, {
                        opacity: 1,
                        y: 0,
                        stagger: 0.1,
                        duration: 0.3,
                        ease: "power2.out"
                    }, "-=0.3");
                } else {
                    tl.to(menuItems, {
                        opacity: 0,
                        duration: 0.2
                    })
                    .to(navbar, {
                        height: 70,
                        duration: 0.4,
                        ease: "power2.inOut",
                        onComplete: () => {
                            gsap.set(menuItems, { display: 'none' });
                        }
                    });
                }
                isMenuOpen = !isMenuOpen;
            }
        });

        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                gsap.set([navbar, menuItems], { clearProps: "all" });
                isMenuOpen = false;
            }
        });
